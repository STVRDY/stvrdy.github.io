      <!-- MODAL -->
      <div class="insta-modal" id="instaModal">
        <div class="insta-modal-content">
          <button class="close-modal" id="closeModal">×</button>

          <div class="modal-left">
            <img id="modalImg" src="" alt="">
          </div>

          <div class="modal-right">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <hr>

            <div class="comments" id="comments"></div>

            <div class="add-comment">
              <input type="text" id="commentInput" placeholder="Agrega un comentario...">
              <button id="postComment">Publicar</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2025 Jhael Báez</p>
    </footer>

  </div>

  <script src="script.js"></script>
